<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>GymTracker</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --bg2: #16162a;
      --bg3: #1e1e35;
      --accent: #7c3aed;
      --accent2: #4f46e5;
      --accent-glow: rgba(124, 58, 237, 0.25);
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #f1f0ff;
      --text2: #a8a4c8;
      --text3: #6b6890;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 32px;
    }

    /* ── Typography ───────────────────────────────────────────── */
    h1 { font-size: 2rem; font-weight: 800; }
    h2 { font-size: 1.4rem; font-weight: 700; }
    h3 { font-size: 1.1rem; font-weight: 600; }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-align: center;
      min-height: 48px;
      letter-spacing: 0.01em;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 2px 16px var(--accent-glow);
    }
    .btn-primary:hover { opacity: 0.92; }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-large {
      width: 100%;
      padding: 18px;
      font-size: 1.1rem;
      border-radius: var(--radius);
    }

    .btn-back {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 1rem;
      cursor: pointer;
      padding: 8px 0;
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 44px;
    }
    .btn-back:hover { color: var(--text); }


    /* ── Dashboard ────────────────────────────────────────────── */
    .dashboard {
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header { padding: 8px 0 4px; }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex: 1;
      width: 100%;
    }
    .app-title { background: linear-gradient(135deg, #a78bfa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .app-subtitle { color: var(--text2); font-size: 0.95rem; margin-top: 4px; }

    .btn-program-switch {
      background: var(--bg3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      color: var(--text2);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .btn-program-switch:active { color: var(--text); border-color: var(--accent); }

    .single-card-wrap {
      padding: 0 16px;
    }

    /* ── Program select ────────────────────────────────────────── */
    .program-select-view {
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .program-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .program-item {
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .program-item:active { background: var(--bg3); }
    .program-item.active {
      border-color: var(--accent);
      background: linear-gradient(145deg, var(--bg2), var(--bg3));
    }

    .program-item-main {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }

    .program-item-name {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .program-item-splits {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .program-split-chip {
      background: var(--bg3);
      color: var(--text2);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .program-item.active .program-split-chip {
      background: rgba(124, 58, 237, 0.15);
      color: #c4b5fd;
    }

    .program-item-right {
      flex-shrink: 0;
    }

    .program-active-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .program-select-arrow {
      color: var(--text3);
      font-size: 1.4rem;
      line-height: 1;
    }

    .program-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      padding: 4px 2px 0;
    }

    .program-empty {
      font-size: 0.9rem;
      color: var(--text3);
      padding: 12px 4px;
    }

    .program-actions {
      display: flex;
      gap: 10px;
      padding-top: 4px;
    }

    .program-actions .btn {
      flex: 1;
      min-height: 44px;
      padding: 12px 10px;
      font-size: 0.9rem;
    }

    .btn-program-delete {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 8px;
      line-height: 1;
      transition: background 0.15s;
    }
    .btn-program-delete:active { background: rgba(239, 68, 68, 0.15); }

    .next-workout-card {
      background: linear-gradient(145deg, var(--bg2), var(--bg3));
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: var(--radius);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 32px var(--accent-glow);
    }

    .next-label { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }
    .next-type { font-size: 2rem; font-weight: 800; color: var(--text); line-height: 1; }
    .next-name { font-size: 0.95rem; color: var(--text2); }

    .exercise-list-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 4px 0 8px;
    }
    .exercise-chip {
      background: rgba(124, 58, 237, 0.15);
      color: var(--text2);
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 99px;
      border: 1px solid rgba(124, 58, 237, 0.2);
    }

    .last-workout-info {
      color: var(--text3);
      font-size: 0.88rem;
      text-align: center;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .warmup-card {
      background: var(--bg2);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 14px 16px;
    }
    .warmup-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
    .warmup-text { font-size: 0.82rem; color: var(--text2); line-height: 1.5; }

    /* ── Workout swipe carousel ────────────────────────────────── */
    .swipe-wrapper {
      overflow: hidden;
      border-radius: var(--radius);
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
    }
    .swipe-track {
      display: flex;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      will-change: transform;
    }
    .swipe-track.dragging {
      transition: none;
    }
    .swipe-track.no-transition {
      transition: none !important;
    }
    .swipe-card {
      min-width: 100%;
      background: linear-gradient(145deg, var(--bg2), var(--bg3));
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: var(--radius);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 32px var(--accent-glow);
      box-sizing: border-box;
    }
    .swipe-card.type-b {
      border-color: rgba(79, 70, 229, 0.35);
      box-shadow: 0 4px 32px rgba(79, 70, 229, 0.2);
    }
    .swipe-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }
    .swipe-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid rgba(255,255,255,0.15);
      transition: background 0.2s, transform 0.2s;
    }
    .swipe-dot.active {
      background: var(--accent);
      transform: scale(1.25);
      border-color: var(--accent);
    }

    /* ── Choose workout ────────────────────────────────────────── */
    .choose-cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 8px;
    }
    .choose-card {
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 22px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .choose-card:hover { border-color: var(--accent); }
    .choose-card:active { transform: scale(0.98); }
    .choose-type { font-size: 1.4rem; font-weight: 800; color: var(--text); }
    .choose-name { color: var(--text2); margin-top: 4px; font-size: 0.95rem; }
    .choose-exercises { color: var(--text3); font-size: 0.82rem; margin-top: 6px; }

    /* ── Workout View ─────────────────────────────────────────── */
    .workout-view {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100vh;
    }

    .workout-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .progress-info { flex: 1; }
    .ex-counter { font-size: 0.82rem; color: var(--text2); display: block; margin-bottom: 6px; }
    .progress-bar-wrap {
      height: 4px;
      background: var(--bg3);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .exercise-card {
      background: var(--bg2);
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .exercise-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .exercise-name { font-size: 1.35rem; font-weight: 700; line-height: 1.2; }
    .exercise-target { font-size: 0.85rem; color: var(--accent); font-weight: 500; margin-top: 3px; }

    .sets-info {
      font-size: 0.88rem;
      color: var(--text2);
      background: var(--bg3);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
    }

    .completed-sets {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .completed-set {
      display: flex;
      align-items: center;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      gap: 8px;
    }
    .set-num { font-size: 0.82rem; color: var(--text3); width: 52px; flex-shrink: 0; }
    .set-result { flex: 1; font-size: 0.95rem; font-weight: 600; color: var(--text); }
    .set-check { color: var(--green); font-size: 1rem; }

    .set-input-card {
      background: var(--bg3);
      border-radius: var(--radius);
      border: 1px solid rgba(124, 58, 237, 0.3);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .set-label { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); }

    .input-row {
      display: flex;
      gap: 12px;
    }
    .input-group {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .input-group label { font-size: 0.78rem; color: var(--text2); font-weight: 500; }
    .input-group input {
      background: var(--bg2);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 1.4rem;
      font-weight: 700;
      padding: 12px 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .input-group input::-webkit-inner-spin-button,
    .input-group input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .input-group input:focus { border-color: var(--accent); }
    .input-hint { font-size: 0.75rem; color: var(--text3); overflow-wrap: break-word; }
    .input-hint.progressed { color: #4caf50; font-weight: 600; }

    .btn-complete {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
    }

    .all-sets-done {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--green);
      font-weight: 600;
      font-size: 1rem;
      padding: 12px;
      background: rgba(16, 185, 129, 0.08);
      border-radius: var(--radius-sm);
    }
    .btn-add-set {
      flex-shrink: 0;
      font-size: 0.9rem;
      padding: 6px 14px;
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .exercise-note {
      font-size: 0.82rem;
      color: var(--text2);
      background: rgba(255,255,255,0.03);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 12px;
      line-height: 1.5;
    }
    .note-icon { margin-right: 4px; }

    .btn-next { margin-top: 4px; }

    .btn-skip-below {
      width: 100%;
      padding: 14px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text3);
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-skip-below:hover { color: var(--yellow); border-color: var(--yellow); }
    .btn-skip-below:active { transform: scale(0.98); }

    /* ── Set timer (aikaharjoitukset) ─────────────────────────── */
    .set-timer-card {
      background: var(--bg2);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: var(--radius);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.3s ease;
      transition: border-color 0.4s ease;
    }
    .set-timer-progress {
      fill: none;
      stroke: var(--green);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }

    /* ── Rest Timer ───────────────────────────────────────────── */
    .rest-timer {
      background: var(--bg2);
      border: 1px solid rgba(124, 58, 237, 0.3);
      border-radius: var(--radius);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.3s ease;
      transition: border-color 0.4s ease, background 0.4s ease;
    }

    .rest-timer.urgent {
      border-color: var(--yellow);
      background: rgba(245, 158, 11, 0.05);
    }

    .timer-label {
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text2);
    }

    .timer-circle {
      position: relative;
      width: 130px;
      height: 130px;
      transition: transform 0.3s ease;
    }
    .rest-timer.urgent .timer-circle {
      animation: pulse-urgent 0.9s ease-in-out infinite;
    }
    @keyframes pulse-urgent {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.05); }
    }

    .timer-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .timer-track {
      fill: none;
      stroke: var(--bg3);
      stroke-width: 8;
    }
    .timer-progress {
      fill: none;
      stroke: url(#timerGradient);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
    }
    .rest-timer.urgent .timer-progress { stroke: var(--yellow); }

    .timer-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.6rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      transform-origin: center;
    }
    @keyframes tick {
      0%   { transform: translate(-50%, -50%) scale(1.18); opacity: 0.6; }
      45%  { transform: translate(-50%, -50%) scale(1);    opacity: 1;   }
      100% { transform: translate(-50%, -50%) scale(1);    opacity: 1;   }
    }
    .timer-number.ticking {
      animation: tick 0.4s ease-out forwards;
    }

    /* ── History ──────────────────────────────────────────────── */
    .history-view {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header h2 { flex: 1; }

    .empty-state {
      color: var(--text3);
      text-align: center;
      padding: 40px 20px;
      font-size: 0.95rem;
    }

    .session-card {
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.15s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .session-card:hover { border-color: rgba(124, 58, 237, 0.3); }
    .session-card.selected {
      border-color: var(--red);
      background: rgba(239, 68, 68, 0.06);
    }
    .session-card-content { flex: 1; min-width: 0; }

    .session-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: background 0.15s, border-color 0.15s;
    }
    .session-card.selected .session-checkbox {
      background: var(--red);
      border-color: var(--red);
      color: white;
    }

    .history-menu-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .history-menu-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: var(--bg3);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-sm);
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 200;
      min-width: 160px;
      box-shadow: var(--shadow);
    }
    .history-menu-item {
      background: none;
      border: none;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 14px;
      text-align: left;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.1s;
      width: 100%;
    }
    .history-menu-item:active { background: rgba(255,255,255,0.08); }
    .history-menu-item.danger { color: var(--red); }

    .history-delete-bar {
      position: sticky;
      bottom: 16px;
      animation: slideUp 0.2s ease;
    }
    .btn-delete-selected {
      width: 100%;
      padding: 16px;
      background: var(--red);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.35);
      transition: opacity 0.15s;
    }
    .btn-delete-selected:active { opacity: 0.85; }

    .session-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }
    .session-type-badge {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 3px 10px;
      border-radius: 99px;
    }
    .type-A { background: rgba(124, 58, 237, 0.2); color: #a78bfa; }
    .type-B { background: rgba(79, 70, 229, 0.2); color: #818cf8; }
    .session-date { font-size: 0.88rem; color: var(--text2); margin-left: 8px; }
    .session-summary { font-size: 0.8rem; color: var(--text3); }

    .session-detail {
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .history-exercise { }
    .history-ex-name { font-size: 0.88rem; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .history-sets { display: flex; flex-wrap: wrap; gap: 6px; }
    .history-set {
      font-size: 0.78rem;
      color: var(--text2);
      background: var(--bg3);
      padding: 3px 10px;
      border-radius: 99px;
    }

    /* ── Modal ────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: flex-end;
      z-index: 200;
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .modal-card {
      background: var(--bg2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 28px 20px 36px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: slideUp 0.22s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .modal-message {
      font-size: 0.95rem;
      color: var(--text2);
      line-height: 1.5;
    }
    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 6px;
    }

    /* ── Exercise Navigator ──────────────────────────────────── */
    .ex-nav-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      display: flex;
      align-items: flex-end;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .ex-nav-overlay.open { opacity: 1; }
    .ex-nav-overlay.open .ex-nav-sheet { transform: translateY(0); }

    .ex-nav-sheet {
      background: var(--bg2);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px 0 32px;
      width: 100%;
      max-height: 72vh;
      overflow-y: auto;
      transform: translateY(40px);
      transition: transform 0.25s cubic-bezier(0.32,0.72,0,1);
    }

    .ex-nav-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      padding: 0 20px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 8px;
    }

    .ex-nav-section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      padding: 10px 20px 4px;
    }

    .ex-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 14px 20px;
      background: none;
      border: none;
      border-left: 3px solid transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: background 0.12s;
    }
    .ex-nav-item:active { background: rgba(255,255,255,0.05); }
    .ex-nav-item.current {
      border-left-color: var(--accent);
      background: rgba(124,58,237,0.08);
    }
    .ex-nav-item.completed {
      opacity: 0.38;
      cursor: default;
      pointer-events: none;
    }

    .ex-nav-item-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .ex-nav-item-name {
      font-size: 0.95rem;
      font-weight: 600;
    }
    .ex-nav-item-target {
      font-size: 0.78rem;
      color: var(--text3);
    }

    .ex-nav-check  { color: var(--green); font-size: 1rem; }
    .ex-nav-arrow  { color: var(--text3); font-size: 1.3rem; line-height: 1; }
    .ex-nav-hint   { font-size: 0.72rem; color: var(--text3); }

    .ex-nav-cancel {
      display: block;
      width: calc(100% - 40px);
      margin: 16px 20px 0;
    }

    /* ── Toast ────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg3);
      color: var(--text);
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow);
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <!-- SVG gradient for timer (hidden) -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <linearGradient id="timerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#7c3aed"/>
        <stop offset="100%" stop-color="#4f46e5"/>
      </linearGradient>
    </defs>
  </svg>

  <div id="app"></div>

  <script src="program.js"></script>
  <script src="app.js"></script>
</body>
</html>
